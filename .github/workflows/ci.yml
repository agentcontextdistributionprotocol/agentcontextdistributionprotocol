name: ACDP CI

on:
  pull_request:
  push:
    branches: [ main ]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  validate:
    name: Validate Schemas, Examples, and Conformance
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install ajv-cli
        run: npm install -g ajv-cli@5 ajv-formats@3

      - name: Validate JSON Schemas (meta)
        run: |
          chmod +x scripts/validate-json-schema.sh
          ./scripts/validate-json-schema.sh

      - name: Validate JSON examples and conformance fixtures
        run: |
          chmod +x scripts/validate-json.sh
          ./scripts/validate-json.sh

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: requirements-dev.txt

      - name: Install conformance runner dependencies
        run: pip install -r requirements-dev.txt

      - name: Run executable conformance vectors
        run: python3 scripts/conformance-runner.py

      - name: Check cross-artifact consistency
        run: python3 scripts/check-consistency.py

  validate-all:
    name: All Validations Passed
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: [validate]

    steps:
      - name: Summary
        run: |
          echo "✓ All ACDP validations passed"
          echo "  - JSON Schemas valid"
          echo "  - JSON examples valid"
          echo "  - Executable conformance vectors passed"
          echo "  - Cross-artifact consistency (fixtures ↔ profiles ↔ registries) passed"
