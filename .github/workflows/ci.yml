name: ACDP CI

on:
  pull_request:
  push:
    branches: [ main ]

jobs:
  validate:
    name: Validate Schemas, Examples, and Conformance
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install ajv-cli
        run: npm install -g ajv-cli ajv-formats

      - name: Validate JSON Schemas (meta)
        run: |
          chmod +x scripts/validate-json-schema.sh
          ./scripts/validate-json-schema.sh

      - name: Validate JSON examples and conformance fixtures
        run: |
          chmod +x scripts/validate-json.sh
          ./scripts/validate-json.sh

      - name: Install protoc
        run: |
          sudo apt-get update
          sudo apt-get install -y protobuf-compiler

      - name: Validate Protobuf compiles
        run: |
          chmod +x scripts/validate-proto.sh
          ./scripts/validate-proto.sh

  lint-protobuf:
    name: Lint Protocol Buffers
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install buf
        uses: bufbuild/buf-setup-action@v1
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Lint protobuf with buf
        run: buf lint

      - name: Check for breaking changes (informational)
        if: github.event_name == 'pull_request'
        continue-on-error: true
        run: |
          git fetch origin main
          buf breaking --against '.git#branch=origin/main'

  validate-all:
    name: All Validations Passed
    runs-on: ubuntu-latest
    needs: [validate, lint-protobuf]

    steps:
      - name: Summary
        run: |
          echo "✓ All ACDP validations passed"
          echo "  - JSON Schemas valid"
          echo "  - JSON examples valid"
          echo "  - Protobuf schemas compile"
          echo "  - Protobuf lint clean"
