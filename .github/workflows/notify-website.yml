name: Notify Website of Doc Changes

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - 'rfcs/**'
      - 'manifesto/**'
      - 'README.md'

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Mint token for acdp-website
        id: app
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ secrets.ACDP_BOT_APP_ID }}
          private-key: ${{ secrets.ACDP_BOT_PRIVATE_KEY }}
          owner: agentcontextdistributionprotocol
          repositories: acdp-website
      - name: Trigger website sync
        uses: peter-evans/repository-dispatch@v4
        with:
          token: ${{ steps.app.outputs.token }}
          repository: agentcontextdistributionprotocol/acdp-website
          event-type: docs-updated
