//
// Context body, registry state, retrieval shape, data references.
// See: rfcs/RFC-ACDP-0002-context-body.md, rfcs/RFC-ACDP-0004-retrieval.md.

syntax = "proto3";

package acdp.v1;

import "acdp/v1/common.proto";

// A single embedded payload inside a data reference.
// Decoded size MUST NOT exceed 65536 bytes (64 KB).
message EmbeddedContent {
  EmbeddedEncoding encoding = 1;

  // The encoded content. For JSON, the canonical JCS form;
  // for UTF8, the raw string; for BASE64, the base64-encoded bytes.
  string content = 2;
}

// A reference to data the context describes.
// Each DataRef MUST contain exactly one of `location_uri`, `location_structured`, or `embedded`.
message DataRef {
  DataRefType type = 1;
  string description = 2;
  uint64 size_bytes = 3;
  string format = 4;
  string schema_version = 5;

  // SHA-256 hash of the referenced data (lowercase hex, optionally `sha256:` prefixed).
  string content_hash = 6;

  oneof source {
    // URI-form location (https, s3, postgres, kafka, ...).
    string location_uri = 7;

    // Structured locator with a dotted-namespace `scheme` and producer-defined fields,
    // serialized as a canonical JSON string. See RFC-ACDP-0002 §6.2(b).
    string location_structured_json = 8;

    EmbeddedContent embedded = 9;
  }
}

// The immutable, signed body of an ACDP context.
// All fields are set at publish time and never change.
// See RFC-ACDP-0002 §3.
message ContextBody {
  // Identity (registry-assigned)
  string ctx_id = 1;
  string lineage_id = 2;
  uint32 version = 3;
  string supersedes = 4;  // empty for first version
  string agent_id = 5;
  repeated string contributors = 6;
  string origin_registry = 7;
  string created_at = 8;

  // Integrity
  string content_hash = 9;
  Signature signature = 10;

  // Description
  string title = 11;
  string description = 12;
  string type = 13;       // standard or namespaced custom
  string domain = 14;
  string schema_uri = 15;
  string summary = 16;

  // Content
  repeated DataRef data_refs = 17;

  // Lineage (epistemic)
  repeated string derived_from = 18;

  // Discovery aids
  repeated string tags = 19;
  repeated double embedding = 20;
  string embedding_model = 21;
  DataPeriod data_period = 22;
  string expires_at = 23;

  // Visibility
  Visibility visibility = 24;
  repeated string audience = 25;

  // Producer-specific structured payload, serialized as canonical JSON string.
  // Shape SHOULD be bound by `schema_uri`.
  string metadata_json = 26;
}

// Registry-maintained state. v0.0.1 contains only `status`.
// Future versions add lifecycle_events, relationships, attestations.
// See RFC-ACDP-0004 §3.
message RegistryState {
  Status status = 1;
}

// Full retrieval shape. See RFC-ACDP-0004 §2.1.
message Context {
  ContextBody body = 1;
  RegistryState registry_state = 2;
}
