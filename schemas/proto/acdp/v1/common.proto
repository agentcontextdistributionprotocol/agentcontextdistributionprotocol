// Common types shared across ACDP messages.
// See: rfcs/RFC-ACDP-0001-core.md, rfcs/RFC-ACDP-0002-context-body.md.

syntax = "proto3";

package acdp.v1;

// A detached signature over a content_hash (the lowercase hex string of the digest).
// See RFC-ACDP-0001 §5.8.
message Signature {
  // Signature algorithm. ed25519 is REQUIRED to support.
  string algorithm = 1;

  // DID URL identifying the signing key (e.g., did:web:agent.example#key-1).
  string key_id = 2;

  // Base64-encoded signature bytes.
  string value = 3;
}

// The time window the underlying data covers. RFC 3339 timestamps in UTC.
// See RFC-ACDP-0002 §3.6.
message DataPeriod {
  string start = 1;
  string end = 2;
}

// Visibility scope for a context. See RFC-ACDP-0002 §7.
enum Visibility {
  VISIBILITY_UNSPECIFIED = 0;
  VISIBILITY_PUBLIC = 1;
  VISIBILITY_RESTRICTED = 2;
  VISIBILITY_PRIVATE = 3;
}

// Derived context status. See RFC-ACDP-0004 §4.
enum Status {
  STATUS_UNSPECIFIED = 0;
  STATUS_ACTIVE = 1;
  STATUS_SUPERSEDED = 2;
  STATUS_EXPIRED = 3;
}

// The role of a data reference within a context. See RFC-ACDP-0002 §6.1.
enum DataRefType {
  DATA_REF_TYPE_UNSPECIFIED = 0;
  DATA_REF_TYPE_PRIMARY_RESULT = 1;
  DATA_REF_TYPE_RAW_DATA = 2;
  DATA_REF_TYPE_SUPPORTING_INFO = 3;
  DATA_REF_TYPE_DERIVED_DATA = 4;
}

// Encoding for embedded data. See RFC-ACDP-0002 §6.3.
enum EmbeddedEncoding {
  EMBEDDED_ENCODING_UNSPECIFIED = 0;
  EMBEDDED_ENCODING_JSON = 1;
  EMBEDDED_ENCODING_UTF8 = 2;
  EMBEDDED_ENCODING_BASE64 = 3;
}
