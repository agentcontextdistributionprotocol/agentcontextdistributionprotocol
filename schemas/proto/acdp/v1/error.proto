// Standard error envelope and code registry. See rfcs/RFC-ACDP-0007-capabilities.md §4–§5.

syntax = "proto3";

package acdp.v1;

// Standard ACDP error codes. See registries/error-codes.md.
enum ErrorCode {
  ERROR_CODE_UNSPECIFIED = 0;
  ERROR_CODE_INVALID_SIGNATURE = 1;
  ERROR_CODE_HASH_MISMATCH = 2;
  ERROR_CODE_SCHEMA_VIOLATION = 3;
  ERROR_CODE_NOT_AUTHORIZED = 4;
  ERROR_CODE_NOT_FOUND = 5;
  ERROR_CODE_VISIBILITY_DENIED = 6;
  ERROR_CODE_SUPERSEDED_TARGET = 7;
  ERROR_CODE_UNSUPPORTED_ALGORITHM = 8;
  ERROR_CODE_UNSUPPORTED_EMBEDDING_MODEL = 9;
  ERROR_CODE_RATE_LIMITED = 10;
  ERROR_CODE_PAYLOAD_TOO_LARGE = 11;
  ERROR_CODE_EMBEDDED_TOO_LARGE = 12;
  ERROR_CODE_IMMUTABLE_FIELD = 13;
}

// Standard error envelope. See RFC-ACDP-0007 §4.
message Error {
  ErrorCode code = 1;
  // Human-readable description. Informational only — MUST NOT drive automated decisions.
  string message = 2;
  // Optional structured details, serialized as canonical JSON string. Shape is code-specific.
  string details_json = 3;
}

// Response envelope used at the wire boundary.
message ErrorResponse {
  Error error = 1;
}
