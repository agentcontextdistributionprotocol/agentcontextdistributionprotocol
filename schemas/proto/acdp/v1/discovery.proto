// Search and similarity responses. See rfcs/RFC-ACDP-0005-discovery.md.

syntax = "proto3";

package acdp.v1;

import "acdp/v1/common.proto";

// Lightweight projection of a context returned in discovery responses.
// See RFC-ACDP-0002 §3 for full body shape.
message MatchSummary {
  string ctx_id = 1;
  string lineage_id = 2;
  string agent_id = 3;
  string title = 4;
  string summary = 5;
  string type = 6;
  string domain = 7;
  string created_at = 8;
  Status status = 9;
}

// Response shape for GET /contexts/search. See RFC-ACDP-0005 §2.
message SearchResponse {
  repeated MatchSummary matches = 1;
  string next_cursor = 2;
  uint64 total_estimate = 3;
}

// One similarity result. See RFC-ACDP-0005 §3.
message SimilarityMatch {
  string ctx_id = 1;
  // Cosine similarity. Typically [0, 1] for normalized embeddings.
  // NOT comparable across embedding models.
  double similarity = 2;
  MatchSummary summary = 3;
}

// Response shape for GET/POST /contexts/similar. See RFC-ACDP-0005 §3.3.
message SimilarityResponse {
  repeated SimilarityMatch matches = 1;
}

// Optional faceted filter set for POST /contexts/similar.
message SimilarityFilters {
  string type = 1;
  string domain = 2;
  string agent_id = 3;
  string schema_uri = 4;
  Status status = 5;
  string created_after = 6;
  string created_before = 7;
}

// Body of POST /contexts/similar. See RFC-ACDP-0005 §3.2.
message SimilarityRequest {
  repeated double embedding = 1;
  string embedding_model = 2;
  uint32 top_k = 3;
  SimilarityFilters filters = 4;
}
