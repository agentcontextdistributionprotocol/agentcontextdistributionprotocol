// Registry capability declaration. See rfcs/RFC-ACDP-0007-capabilities.md.

syntax = "proto3";

package acdp.v1;

// Limits enforced by a registry. See RFC-ACDP-0007 §3.
message Limits {
  uint64 max_payload_bytes = 1;
  // Fixed at 65536 by the spec.
  uint64 max_embedded_bytes = 2;
}

// Served at /.well-known/acdp.json. See RFC-ACDP-0007 §3.
message Capabilities {
  string acdp_version = 1;
  string registry_did = 2;
  repeated string supported_signature_algorithms = 3;
  repeated string supported_embedding_models = 4;
  Limits limits = 5;
}
